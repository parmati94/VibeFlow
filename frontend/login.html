<!doctype html>
<html lang="en" data-theme="vibe">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlow — Sign in</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="stylesheet" href="/css/main.css" />
    <script type="module" src="/js/login.js"></script>
  </head>
  <body class="bg-neutral-950 text-neutral-100 min-h-screen relative overflow-hidden flex items-center justify-center px-4">
    <!-- Layered backdrop: accent bloom (top + bottom) + faint grid with a vignette mask -->
    <div
      class="pointer-events-none absolute inset-0"
      style="background:
        radial-gradient(48rem 48rem at 50% -8%, rgb(var(--accent-500) / 0.20), transparent 60%),
        radial-gradient(36rem 36rem at 50% 116%, rgb(var(--accent-700) / 0.12), transparent 60%);"
    ></div>
    <div
      class="pointer-events-none absolute inset-0 opacity-[0.05]"
      style="background-image:
        linear-gradient(rgb(255 255 255) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255) 1px, transparent 1px);
        background-size: 44px 44px;
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000, transparent 80%);
        mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, #000, transparent 80%);"
    ></div>

    <div class="w-full max-w-sm relative" x-data="loginForm" x-cloak>
      <div class="bg-neutral-900/60 backdrop-blur-xl rounded-2xl p-8 border border-white/10 ring-1 ring-black/20 shadow-2xl">
        <div class="text-center mb-7">
          <div class="relative h-14 w-14 mx-auto mb-4">
            <div class="absolute inset-0 rounded-2xl blur-lg" style="background: rgb(var(--accent-500) / 0.40);"></div>
            <div class="relative h-14 w-14 grid place-items-center rounded-2xl bg-gradient-to-br from-accent-400 to-accent-600 text-neutral-950 font-black text-lg shadow-lg shadow-accent-500/20">
              VF
            </div>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">
            <span class="text-neutral-100">Vibe</span><span class="text-accent-400">Flow</span>
          </h1>
          <p class="text-sm text-neutral-500 mt-1.5">Spotify → Tidal playlist sync</p>
        </div>

        <form @submit.prevent="login()" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-neutral-400 mb-1.5 uppercase tracking-wide">Username</label>
            <div class="relative">
              <svg class="w-4 h-4 text-neutral-500 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              <input
                type="text"
                x-model="username"
                autocomplete="username"
                required
                class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg pl-9 pr-3 py-2.5 text-sm text-neutral-100 focus:outline-none focus:border-accent-500/60 focus:ring-2 focus:ring-accent-500/25 transition"
              />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-neutral-400 mb-1.5 uppercase tracking-wide">Password</label>
            <div class="relative">
              <svg class="w-4 h-4 text-neutral-500 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v3m-6 5h12a2 2 0 002-2v-5a2 2 0 00-2-2H6a2 2 0 00-2 2v5a2 2 0 002 2zm9-9V7a4 4 0 00-8 0v3h8z" />
              </svg>
              <input
                type="password"
                x-model="password"
                autocomplete="current-password"
                required
                class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg pl-9 pr-3 py-2.5 text-sm text-neutral-100 focus:outline-none focus:border-accent-500/60 focus:ring-2 focus:ring-accent-500/25 transition"
              />
            </div>
          </div>

          <p x-show="error" x-cloak x-text="error" class="text-xs text-red-300 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></p>

          <button
            type="submit"
            :disabled="loading"
            class="w-full bg-accent-500 hover:bg-accent-400 disabled:opacity-50 disabled:cursor-not-allowed text-neutral-950 font-semibold py-2.5 px-4 rounded-lg transition shadow-lg shadow-accent-500/20 hover:shadow-accent-500/30 text-sm"
          >
            <span x-show="!loading">Sign in</span>
            <span x-show="loading">Signing in…</span>
          </button>
        </form>
      </div>
      <p class="text-center text-[11px] text-neutral-600 mt-5">VibeFlow · self-hosted</p>
    </div>
  </body>
</html>
