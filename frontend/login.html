<!doctype html>
<html lang="en" data-theme="vibe">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlow — Sign in</title>
    <link rel="stylesheet" href="/css/main.css" />
    <script type="module" src="/js/login.js"></script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-neutral-100 flex items-center justify-center px-4 relative overflow-hidden">
    <div
      class="pointer-events-none absolute inset-0"
      style="background: radial-gradient(40rem 40rem at 50% -10%, rgb(var(--accent-500) / 0.18), transparent 60%);"
    ></div>

    <div class="w-full max-w-sm relative" x-data="loginForm" x-cloak>
      <div class="rounded-2xl border border-neutral-800 bg-neutral-900/70 backdrop-blur-xl p-8 shadow-2xl">
        <div class="text-center mb-7">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent-400 to-accent-600 grid place-items-center text-neutral-950 font-black mx-auto mb-4 shadow-lg shadow-accent-500/20">
            VF
          </div>
          <h1 class="text-xl font-semibold tracking-tight">VibeFlow</h1>
          <p class="text-sm text-neutral-500 mt-1">Sign in to continue</p>
        </div>

        <form @submit.prevent="login()" class="space-y-4">
          <div>
            <label class="block text-xs text-neutral-500 mb-1.5">Username</label>
            <input
              x-model="username"
              type="text"
              autocomplete="username"
              class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm focus:border-accent-500/60 focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-xs text-neutral-500 mb-1.5">Password</label>
            <input
              x-model="password"
              type="password"
              autocomplete="current-password"
              class="w-full rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm focus:border-accent-500/60 focus:outline-none"
            />
          </div>

          <p x-show="error" x-text="error" class="text-xs text-red-300 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></p>

          <button
            type="submit"
            :disabled="loading"
            class="w-full rounded-lg bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-4 py-2.5 transition disabled:opacity-50"
          >
            <span x-text="loading ? 'Signing in…' : 'Sign in'"></span>
          </button>
        </form>
      </div>
      <p class="text-center text-[11px] text-neutral-600 mt-4">VibeFlow — Spotify → Tidal playlist sync</p>
    </div>
  </body>
</html>
