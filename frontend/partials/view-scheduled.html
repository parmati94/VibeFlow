<section class="space-y-5">
  <div>
    <h2 class="text-lg font-semibold">Schedules</h2>
    <p class="text-xs text-neutral-500">Your automatic syncs. Create new ones from the <button @click="setView('sync')" class="text-accent-300 hover:text-accent-200 underline-offset-2 hover:underline">Sync</button> page.</p>
  </div>

  <!-- Loading / empty -->
  <div x-show="mappingsLoading" class="text-sm text-neutral-500 py-6 text-center">Loading…</div>
  <div x-show="!mappingsLoading && mappings.length === 0" class="rounded-xl border border-dashed border-neutral-800 p-8 text-center">
    <p class="text-sm text-neutral-400">No schedules yet.</p>
    <p class="text-xs text-neutral-600 mt-1">Pick a playlist on the Sync page and choose “Schedule”.</p>
  </div>

  <!-- List -->
  <div class="space-y-3">
    <template x-for="m in mappings" :key="m.id">
      <div class="group rounded-xl border border-neutral-800 bg-neutral-900/40 p-4 transition-all duration-200 hover:border-accent-500/40 hover:bg-neutral-900/70 hover:shadow-lg hover:shadow-black/30">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-accent-500/10 text-accent-400 grid place-items-center shrink-0 transition group-hover:bg-accent-500/20" :class="!m.enabled ? 'opacity-40' : ''">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          </div>

          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1.5">
              <p class="font-medium truncate min-w-0" x-text="m.spotify_name"></p>
              <button @click="openEdit(m)" data-tooltip="Edit schedule" class="tooltip shrink-0 grid place-items-center w-6 h-6 rounded-md text-neutral-500 hover:text-accent-300 hover:bg-neutral-800 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
              </button>
              <span x-show="m.last_status" class="text-[10px] px-1.5 py-0.5 rounded-full capitalize shrink-0 ml-0.5" :class="statusClass(m.last_status)" x-text="m.last_status"></span>
            </div>
            <p class="text-xs text-neutral-500 mt-0.5 truncate">
              <span class="text-accent-400/90" x-text="scheduleLabel(m)"></span>
              <span class="text-neutral-600">·</span> next <span x-text="m.enabled ? formatWhen(m.next_run_at) : 'paused'"></span>
              <span class="text-neutral-600">·</span> last <span x-text="formatWhen(m.last_run_at)"></span>
            </p>
          </div>

          <div class="flex items-center gap-1 shrink-0">
            <button @click="toggleMapping(m)" class="tooltip relative w-9 h-5 rounded-full transition mr-1" :class="m.enabled ? 'bg-accent-500' : 'bg-neutral-700'" :data-tooltip="m.enabled ? 'Pause' : 'Resume'">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform" :class="m.enabled ? 'translate-x-4' : ''"></span>
            </button>
            <button @click="runMappingNow(m)" data-tooltip="Sync now" class="tooltip grid place-items-center w-8 h-8 rounded-lg bg-accent-500/15 text-accent-300 hover:bg-accent-500/25 transition">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
            <span class="w-px h-5 bg-neutral-800 mx-0.5"></span>
            <button @click="deleteMapping(m)" data-tooltip="Remove" class="tooltip grid place-items-center w-8 h-8 rounded-lg text-neutral-500 hover:text-red-400 hover:bg-neutral-800 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Live progress -->
  <div x-show="activeRuns.length > 0">
    {{> sync-status }}
  </div>
</section>
