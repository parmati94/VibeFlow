<section class="space-y-5">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h2 class="text-lg font-semibold">Scheduled syncs</h2>
      <p class="text-xs text-neutral-500">Playlists kept in sync automatically. Only new tracks are added each run.</p>
    </div>
    <button
      @click="showForm && formMode === 'create' ? closeForm() : openCreate()"
      class="rounded-xl bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-4 py-2 transition"
      x-text="showForm && formMode === 'create' ? 'Cancel' : '+ New'"
    ></button>
  </div>

  <!-- Builder (create + edit) -->
  <div x-show="showForm" x-transition class="rounded-xl border border-neutral-800 bg-neutral-900/50 p-4 space-y-3">
    <p class="text-sm font-medium" x-text="formMode === 'create' ? 'New scheduled sync' : ('Edit schedule — ' + (mappings.find(m => m.id === editingId)?.spotify_name || ''))"></p>

    <!-- Playlist (create only). x-if so the dropdown initializes with playlists already
         loaded (capturing playlistOpts), not at page load when the list is still empty. -->
    <template x-if="formMode === 'create'">
     <div>
      <label class="text-xs text-neutral-500 mb-1 block">Playlist</label>
      <div x-data="vfselect(playlistOpts, 'Select a playlist…')" x-modelable="value" x-model="sform.spotify_playlist_id" @click.away="open = false" class="relative">
        <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
          <span :class="!current && 'text-neutral-500'" x-text="selectedLabel"></span>
          <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
          <template x-for="o in options" :key="o.value">
            <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
              <span class="truncate" x-text="o.label"></span>
              <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </button>
          </template>
        </div>
      </div>
     </div>
    </template>

    <div class="grid sm:grid-cols-2 gap-3">
      <!-- Frequency -->
      <div>
        <label class="text-xs text-neutral-500 mb-1 block">Frequency</label>
        <div x-data="vfselect(freqOpts)" x-modelable="value" x-model="sform.frequency" @click.away="open = false" class="relative">
          <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
            <span x-text="selectedLabel"></span>
            <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl py-1">
            <template x-for="o in options" :key="o.value">
              <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
                <span x-text="o.label"></span>
                <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Weekly: day -->
      <div x-show="sform.frequency === 'weekly'">
        <label class="text-xs text-neutral-500 mb-1 block">Day</label>
        <div x-data="vfselect(dayOpts)" x-modelable="value" x-model="sform.day_of_week" @click.away="open = false" class="relative">
          <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
            <span x-text="selectedLabel"></span>
            <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
            <template x-for="o in options" :key="o.value">
              <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
                <span x-text="o.label"></span>
                <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Monthly: day of month -->
      <div x-show="sform.frequency === 'monthly'">
        <label class="text-xs text-neutral-500 mb-1 block">Day of month</label>
        <div x-data="vfselect(monthDayOpts)" x-modelable="value" x-model="sform.day_of_month" @click.away="open = false" class="relative">
          <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
            <span x-text="selectedLabel"></span>
            <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
            <template x-for="o in options" :key="o.value">
              <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
                <span x-text="o.label"></span>
                <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Hourly: minute past the hour -->
      <div x-show="sform.frequency === 'hourly'">
        <label class="text-xs text-neutral-500 mb-1 block">Minute past the hour</label>
        <div x-data="vfselect(minPastHourOpts)" x-modelable="value" x-model="sform.minute" @click.away="open = false" class="relative">
          <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
            <span x-text="selectedLabel"></span>
            <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
            <template x-for="o in options" :key="o.value">
              <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
                <span x-text="o.label"></span>
                <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Daily / weekly / monthly: time (hour : minute AM/PM) -->
      <div x-show="sform.frequency !== 'hourly'">
        <label class="text-xs text-neutral-500 mb-1 block">Time</label>
        <div class="flex items-center gap-2">
          <!-- hour -->
          <div x-data="vfselect(hourOpts)" x-modelable="value" x-model="sform.hour12" @click.away="open = false" class="relative w-16">
            <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-1 rounded-lg border border-neutral-800 bg-neutral-900 px-2.5 py-2 text-sm hover:border-neutral-700 focus:outline-none transition">
              <span x-text="selectedLabel"></span>
              <svg class="w-3.5 h-3.5 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
              <template x-for="o in options" :key="o.value">
                <button type="button" @click="pick(o.value)" class="w-full text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'" x-text="o.label"></button>
              </template>
            </div>
          </div>
          <span class="text-neutral-500">:</span>
          <!-- minute -->
          <div x-data="vfselect(minuteOpts)" x-modelable="value" x-model="sform.minute" @click.away="open = false" class="relative w-16">
            <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-1 rounded-lg border border-neutral-800 bg-neutral-900 px-2.5 py-2 text-sm hover:border-neutral-700 focus:outline-none transition">
              <span x-text="selectedLabel"></span>
              <svg class="w-3.5 h-3.5 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl max-h-56 overflow-auto py-1">
              <template x-for="o in options" :key="o.value">
                <button type="button" @click="pick(o.value)" class="w-full text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'" x-text="o.label"></button>
              </template>
            </div>
          </div>
          <!-- AM/PM -->
          <div x-data="vfselect(ampmOpts)" x-modelable="value" x-model="sform.ampm" @click.away="open = false" class="relative w-20">
            <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-1 rounded-lg border border-neutral-800 bg-neutral-900 px-2.5 py-2 text-sm hover:border-neutral-700 focus:outline-none transition">
              <span x-text="selectedLabel"></span>
              <svg class="w-3.5 h-3.5 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl py-1">
              <template x-for="o in options" :key="o.value">
                <button type="button" @click="pick(o.value)" class="w-full text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'" x-text="o.label"></button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex gap-2">
      <button @click="saveForm()" class="rounded-lg bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-4 py-2 transition" x-text="formMode === 'create' ? 'Create scheduled sync' : 'Save'"></button>
      <button @click="closeForm()" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
    </div>
  </div>

  <!-- Loading / empty -->
  <div x-show="mappingsLoading" class="text-sm text-neutral-500 py-6 text-center">Loading…</div>
  <div x-show="!mappingsLoading && mappings.length === 0 && !showForm" class="rounded-xl border border-dashed border-neutral-800 p-8 text-center">
    <p class="text-sm text-neutral-400">No scheduled syncs yet.</p>
    <p class="text-xs text-neutral-600 mt-1">Click "+ New" to keep a playlist in sync automatically.</p>
  </div>

  <!-- List -->
  <div class="space-y-3">
    <template x-for="m in mappings" :key="m.id">
      <div class="group rounded-xl border border-neutral-800 bg-neutral-900/40 p-4 transition-all duration-200 hover:border-accent-500/40 hover:bg-neutral-900/70 hover:shadow-lg hover:shadow-black/30">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-accent-500/10 text-accent-400 grid place-items-center shrink-0 transition group-hover:bg-accent-500/20" :class="!m.enabled ? 'opacity-40' : ''">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          </div>

          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1.5">
              <p class="font-medium truncate min-w-0" x-text="m.spotify_name"></p>
              <button @click="openEdit(m)" data-tooltip="Edit schedule" class="tooltip shrink-0 grid place-items-center w-6 h-6 rounded-md text-neutral-500 hover:text-accent-300 hover:bg-neutral-800 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
              </button>
              <span x-show="m.last_status" class="text-[10px] px-1.5 py-0.5 rounded-full capitalize shrink-0 ml-0.5" :class="statusClass(m.last_status)" x-text="m.last_status"></span>
            </div>
            <p class="text-xs text-neutral-500 mt-0.5 truncate">
              <span class="text-accent-400/90" x-text="scheduleLabel(m)"></span>
              <span class="text-neutral-600">·</span> next <span x-text="m.enabled ? formatWhen(m.next_run_at) : 'paused'"></span>
              <span class="text-neutral-600">·</span> last <span x-text="formatWhen(m.last_run_at)"></span>
            </p>
          </div>

          <div class="flex items-center gap-1 shrink-0">
            <button @click="toggleMapping(m)" class="tooltip relative w-9 h-5 rounded-full transition mr-1" :class="m.enabled ? 'bg-accent-500' : 'bg-neutral-700'" :data-tooltip="m.enabled ? 'Pause' : 'Resume'">
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform" :class="m.enabled ? 'translate-x-4' : ''"></span>
            </button>
            <button @click="runMappingNow(m)" data-tooltip="Sync now" class="tooltip grid place-items-center w-8 h-8 rounded-lg bg-accent-500/15 text-accent-300 hover:bg-accent-500/25 transition">
              <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
            <span class="w-px h-5 bg-neutral-800 mx-0.5"></span>
            <button @click="deleteMapping(m)" data-tooltip="Remove" class="tooltip grid place-items-center w-8 h-8 rounded-lg text-neutral-500 hover:text-red-400 hover:bg-neutral-800 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Live progress -->
  <div x-show="activeRuns.length > 0">
    {{> sync-status }}
  </div>
</section>
