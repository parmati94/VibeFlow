<!-- Settings slide-over (theme picker). -->
<div
  x-show="showSettings"
  x-transition:leave="duration-200"
  @keydown.escape.window="showSettings = false"
  class="fixed inset-0 z-[100] flex justify-end"
  style="display:none"
>
  <div
    x-show="showSettings"
    x-transition:enter="transition-opacity ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="absolute inset-0 bg-black/60 backdrop-blur-sm"
    @click="showSettings = false"
  ></div>

  <aside
    x-show="showSettings"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="relative w-full max-w-xs h-full bg-neutral-900 border-l border-neutral-800 shadow-2xl p-6 overflow-y-auto"
  >
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-semibold">Settings</h2>
      <button @click="showSettings = false" aria-label="Close" class="grid place-items-center w-8 h-8 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800">✕</button>
    </div>

    <h3 class="text-xs font-medium text-neutral-400 uppercase tracking-wide mb-3">Accent theme</h3>
    <div class="grid grid-cols-6 gap-2.5">
      <template x-for="t in themes" :key="t.id">
        <button
          @click="applyTheme(t.id)"
          :title="t.label"
          class="aspect-square rounded-xl border-2 grid place-items-center transition-all"
          :class="theme === t.id ? 'border-white scale-105' : 'border-transparent hover:border-neutral-600'"
          :style="`background-color: ${t.swatch}`"
        >
          <svg x-show="theme === t.id" class="w-4 h-4 text-neutral-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </button>
      </template>
    </div>
    <p class="text-xs text-neutral-500 mt-3">Re-tints the whole app. Saved on this device.</p>

    <!-- Account: change own password (only when the login gate is on) -->
    <template x-if="loginEnabled && currentUser">
      <div class="mt-8 pt-6 border-t border-neutral-800">
        <h3 class="text-xs font-medium text-neutral-400 uppercase tracking-wide mb-1">Account</h3>
        <p class="text-xs text-neutral-500 mb-3">Signed in as <span class="text-neutral-300" x-text="currentUser.username"></span><span x-show="isAdmin" class="text-accent-400"> · admin</span></p>
        <form @submit.prevent="changeOwnPassword()" class="space-y-2">
          <input type="password" x-model="pwForm.current" autocomplete="current-password" placeholder="Current password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
          <input type="password" x-model="pwForm.next" autocomplete="new-password" placeholder="New password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
          <input type="password" x-model="pwForm.confirm" autocomplete="new-password" placeholder="Confirm new password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
          <button type="submit" :disabled="changingPw" class="w-full bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 text-neutral-100 text-sm rounded-lg py-2 transition">
            <span x-show="!changingPw">Change password</span>
            <span x-show="changingPw">Saving…</span>
          </button>
        </form>
      </div>
    </template>

    <!-- Users (admin only) -->
    <template x-if="isAdmin">
      <div class="mt-8 pt-6 border-t border-neutral-800">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xs font-medium text-neutral-400 uppercase tracking-wide">Users</h3>
          <button @click="loadUsers()" class="text-xs text-neutral-500 hover:text-neutral-300">↻</button>
        </div>

        <div x-show="usersLoading" class="text-xs text-neutral-500 py-2">Loading…</div>
        <ul class="space-y-1.5">
          <template x-for="u in userList" :key="u.id">
            <li class="flex items-center gap-2 rounded-lg bg-neutral-950/50 border border-neutral-800 px-3 py-2">
              <div class="min-w-0 flex-1">
                <p class="text-sm truncate" x-text="u.username"></p>
                <p x-show="u.is_admin" class="text-[10px] text-accent-400 uppercase tracking-wide">admin</p>
              </div>
              <button @click="askResetPassword(u)" data-tooltip="Reset password" class="tooltip grid place-items-center w-7 h-7 rounded-md text-neutral-500 hover:text-accent-300 hover:bg-neutral-800 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
              </button>
              <button @click="askDeleteUser(u)" :disabled="u.id === (currentUser && currentUser.id)" data-tooltip="Delete user" class="tooltip grid place-items-center w-7 h-7 rounded-md text-neutral-500 hover:text-red-400 hover:bg-neutral-800 transition disabled:opacity-30 disabled:cursor-not-allowed">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </li>
          </template>
        </ul>

        <!-- Create user: collapsed to a single button until clicked -->
        <button
          x-show="!showNewUser"
          @click="openNewUser()"
          class="mt-3 w-full flex items-center justify-center gap-1.5 rounded-lg border border-dashed border-neutral-700 text-neutral-300 hover:border-accent-500/50 hover:text-accent-200 text-sm py-2 transition"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
          Create user
        </button>

        <form
          x-show="showNewUser"
          x-cloak
          x-transition:enter="transition ease-out duration-150"
          x-transition:enter-start="opacity-0 -translate-y-1"
          x-transition:enter-end="opacity-100 translate-y-0"
          @submit.prevent="createUser()"
          class="mt-3 space-y-2 rounded-lg border border-neutral-800 bg-neutral-950/40 p-3"
        >
          <input type="text" x-model="newUser.username" autocomplete="off" placeholder="New username" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
          <input type="password" x-model="newUser.password" autocomplete="new-password" placeholder="Password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
          <div class="flex items-center justify-between py-1">
            <div class="select-none">
              <p class="text-sm text-neutral-200">Admin</p>
              <p class="text-[11px] text-neutral-500">Can manage other users</p>
            </div>
            <button
              type="button"
              @click="newUser.is_admin = !newUser.is_admin"
              :data-tooltip="newUser.is_admin ? 'Admin' : 'Standard user'"
              class="tooltip relative w-9 h-5 rounded-full transition shrink-0"
              :class="newUser.is_admin ? 'bg-accent-500' : 'bg-neutral-700'"
            >
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform" :class="newUser.is_admin ? 'translate-x-4' : ''"></span>
            </button>
          </div>
          <div class="flex gap-2">
            <button type="button" @click="cancelNewUser()" class="flex-1 rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm py-2 transition">Cancel</button>
            <button type="submit" :disabled="creatingUser" class="flex-1 bg-accent-500 hover:bg-accent-400 disabled:opacity-50 text-neutral-950 font-medium text-sm rounded-lg py-2 transition">
              <span x-show="!creatingUser">Add user</span>
              <span x-show="creatingUser">Adding…</span>
            </button>
          </div>
        </form>
      </div>
    </template>
  </aside>
</div>
