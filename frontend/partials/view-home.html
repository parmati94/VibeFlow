<section class="py-6 space-y-8">
  <div class="text-center max-w-xl mx-auto">
    <h2 class="text-2xl sm:text-3xl font-bold tracking-tight bg-gradient-to-b from-white to-neutral-400 bg-clip-text text-transparent">
      What would you like to do?
    </h2>
    <p class="mt-2 text-neutral-400 text-sm">Both services connected — pick an action below.</p>
  </div>

  <div class="grid sm:grid-cols-3 gap-4">
    <!-- Sync once -->
    <button @click="setView('sync')" class="group text-left rounded-2xl border border-neutral-800 bg-gradient-to-b from-neutral-900 to-neutral-900/40 p-6 hover:border-accent-500/50 transition">
      <div class="w-11 h-11 rounded-xl bg-accent-500/15 grid place-items-center text-accent-400 text-xl mb-4 group-hover:scale-105 transition">↻</div>
      <h3 class="font-semibold mb-1">Sync once</h3>
      <p class="text-xs text-neutral-500">Pick one or more playlists and copy them to Tidal right now.</p>
    </button>

    <!-- Scheduled -->
    <button @click="setView('scheduled')" class="group text-left rounded-2xl border border-neutral-800 bg-gradient-to-b from-neutral-900 to-neutral-900/40 p-6 hover:border-accent-500/50 transition">
      <div class="w-11 h-11 rounded-xl bg-accent-500/15 grid place-items-center text-accent-400 text-xl mb-4 group-hover:scale-105 transition">⏱</div>
      <h3 class="font-semibold mb-1">Scheduled syncs</h3>
      <p class="text-xs text-neutral-500">
        Keep a playlist in sync automatically.
        <span x-show="activeScheduleCount > 0" class="text-accent-300" x-text="`${activeScheduleCount} active`"></span>
      </p>
    </button>

    <!-- History -->
    <button @click="setView('history')" class="group text-left rounded-2xl border border-neutral-800 bg-gradient-to-b from-neutral-900 to-neutral-900/40 p-6 hover:border-accent-500/50 transition">
      <div class="w-11 h-11 rounded-xl bg-accent-500/15 grid place-items-center text-accent-400 text-xl mb-4 group-hover:scale-105 transition">≣</div>
      <h3 class="font-semibold mb-1">History</h3>
      <p class="text-xs text-neutral-500">
        Review past syncs and unmatched tracks.
        <span x-show="history.length" class="text-neutral-400" x-text="`${history.length} runs`"></span>
      </p>
    </button>
  </div>

  <!-- Live sync banner if something is running -->
  <div x-show="activeRuns.length > 0">
    {{> sync-status }}
  </div>
</section>
