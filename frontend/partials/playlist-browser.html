<section class="space-y-4">
  <!-- Toolbar -->
  <div class="flex flex-wrap items-center gap-3">
    <div class="relative flex-1 min-w-[200px]">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 text-sm">⌕</span>
      <input
        x-model="filter"
        type="text"
        placeholder="Search playlists…"
        class="w-full rounded-xl border border-neutral-800 bg-neutral-900/60 pl-9 pr-3 py-2 text-sm placeholder-neutral-600 focus:border-accent-500/60 focus:outline-none"
      />
    </div>
    <button @click="selectAllVisible()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1">Select all</button>
    <button @click="clearSelection()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1" x-show="selectedCount > 0">Clear</button>
    <button @click="loadPlaylists()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1">↻ Refresh</button>
  </div>

  <!-- Loading -->
  <div x-show="playlistsLoading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <template x-for="i in 6" :key="i">
      <div class="h-[72px] rounded-xl border border-neutral-800 bg-neutral-900/40 animate-pulse"></div>
    </template>
  </div>

  <!-- Error -->
  <div x-show="playlistError" class="rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-300">
    <span x-text="playlistError"></span>
  </div>

  <!-- Grid -->
  <div x-show="!playlistsLoading && !playlistError" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <template x-for="pl in filteredPlaylists" :key="pl.id">
      <button
        @click="toggleSelect(pl.id)"
        class="group text-left rounded-xl border p-3 flex items-center gap-3 transition"
        :class="isSelected(pl.id) ? 'border-accent-500/70 bg-accent-500/10 ring-1 ring-accent-500/40' : 'border-neutral-800 bg-neutral-900/40 hover:border-neutral-700'"
      >
        <div class="relative w-12 h-12 rounded-lg overflow-hidden bg-neutral-800 shrink-0 grid place-items-center">
          <template x-if="pl.image_url">
            <img :src="pl.image_url" :alt="pl.name" class="w-full h-full object-cover" />
          </template>
          <template x-if="!pl.image_url">
            <span class="text-neutral-600 text-lg">♪</span>
          </template>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-medium truncate" x-text="pl.name"></p>
          <p class="text-xs text-neutral-500" x-text="pl.track_count + ' tracks'"></p>
        </div>
        <span
          class="w-5 h-5 rounded-md border grid place-items-center text-[11px] shrink-0 transition"
          :class="isSelected(pl.id) ? 'bg-accent-500 border-accent-500 text-neutral-950' : 'border-neutral-700 text-transparent group-hover:border-neutral-500'"
        >✓</span>
      </button>
    </template>
    <template x-if="filteredPlaylists.length === 0">
      <p class="text-sm text-neutral-500 col-span-full py-8 text-center">No playlists found.</p>
    </template>
  </div>
</section>

<!-- Sticky sync bar -->
<div
  x-show="selectedCount > 0"
  x-transition.opacity
  class="fixed inset-x-0 bottom-0 z-30 border-t border-neutral-800 bg-neutral-950/90 backdrop-blur"
>
  <div class="container mx-auto max-w-5xl px-4 py-3 flex items-center gap-4">
    <p class="text-sm text-neutral-300">
      <span class="font-semibold text-white" x-text="selectedCount"></span>
      playlist<span x-show="selectedCount !== 1">s</span> selected
    </p>
    <button @click="clearSelection()" class="text-xs text-neutral-500 hover:text-neutral-300">Clear</button>
    <button
      @click="startSync()"
      :disabled="syncing"
      class="ml-auto rounded-xl bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-5 py-2.5 transition disabled:opacity-50 flex items-center gap-2"
    >
      <span x-show="!syncing">Sync to Tidal →</span>
      <span x-show="syncing">Starting…</span>
    </button>
  </div>
</div>
