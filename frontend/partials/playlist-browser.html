<section class="space-y-4">
  <!-- Toolbar -->
  <div class="flex flex-wrap items-center gap-3">
    <div class="relative flex-1 min-w-[200px]">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 text-sm">⌕</span>
      <input
        x-model="filter"
        type="text"
        placeholder="Search playlists…"
        class="w-full rounded-xl border border-neutral-800 bg-neutral-900/60 pl-9 pr-3 py-2 text-sm placeholder-neutral-600 focus:border-accent-500/60 focus:outline-none"
      />
    </div>
    <div x-show="playlists.length > 1" x-data="vfselect(plSortOpts)" x-modelable="value" x-model="plSort" @click.away="open = false" class="relative w-40 shrink-0">
      <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-xl border border-neutral-800 bg-neutral-900/60 px-3 py-2 text-xs text-neutral-300 hover:border-neutral-700 focus:outline-none transition">
        <span class="flex items-center gap-1.5 min-w-0">
          <svg class="w-3.5 h-3.5 text-neutral-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4 4m0 0l-4 4m4-4H7" /></svg>
          <span class="truncate" x-text="selectedLabel"></span>
        </span>
        <svg class="w-3.5 h-3.5 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
      </button>
      <div x-show="open" x-transition.opacity.duration.100ms class="absolute right-0 z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-950 shadow-xl py-1">
        <template x-for="o in options" :key="o.value">
          <button type="button" @click="pick(o.value); setPlSort(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-xs transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
            <span x-text="o.label"></span>
            <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
          </button>
        </template>
      </div>
    </div>
    <button @click="selectAllVisible()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1">Select all</button>
    <button @click="clearSelection()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1" x-show="selectedCount > 0">Clear</button>
    <button @click="loadPlaylists()" class="text-xs text-neutral-400 hover:text-neutral-200 px-2 py-1">↻ Refresh</button>
  </div>

  <!-- Loading -->
  <div x-show="playlistsLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <template x-for="i in 6" :key="i">
      <div class="h-[72px] rounded-xl border border-neutral-800 bg-neutral-900/40 animate-pulse"></div>
    </template>
  </div>

  <!-- Error -->
  <div x-show="playlistError" class="rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-300">
    <span x-text="playlistError"></span>
  </div>

  <!-- Grid -->
  <div x-show="!playlistsLoading && !playlistError" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <template x-for="pl in filteredPlaylists" :key="pl.id">
      <button
        @click="toggleSelect(pl.id)"
        class="group text-left rounded-xl border p-3 flex items-center gap-3 transition-all duration-200 hover:shadow-md hover:shadow-black/20"
        :class="isSelected(pl.id) ? 'border-accent-500/70 bg-accent-500/10 ring-1 ring-accent-500/40' : 'border-neutral-800 bg-neutral-900/40 hover:border-accent-500/40 hover:bg-neutral-900/70'"
      >
        <div class="relative w-12 h-12 rounded-lg overflow-hidden bg-neutral-800 shrink-0 grid place-items-center">
          <template x-if="pl.image_url">
            <img :src="pl.image_url" :alt="pl.name" class="w-full h-full object-cover" />
          </template>
          <template x-if="!pl.image_url">
            <span class="text-neutral-600 text-lg">♪</span>
          </template>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-medium truncate" x-text="pl.name"></p>
          <p class="text-xs text-neutral-500" x-text="pl.track_count + ' tracks'"></p>
        </div>
        <span
          class="w-5 h-5 rounded-md border grid place-items-center text-[11px] shrink-0 transition"
          :class="isSelected(pl.id) ? 'bg-accent-500 border-accent-500 text-neutral-950' : 'border-neutral-700 text-transparent group-hover:border-neutral-500'"
        >✓</span>
      </button>
    </template>
    <template x-if="filteredPlaylists.length === 0">
      <p class="text-sm text-neutral-500 col-span-full py-8 text-center">No playlists found.</p>
    </template>
  </div>
</section>

<!-- Sticky sync bar -->
<div
  x-show="selectedCount > 0"
  x-transition.opacity
  class="fixed inset-x-0 bottom-0 z-30 border-t border-neutral-800 bg-neutral-950/90 backdrop-blur"
>
  <div class="container mx-auto max-w-5xl px-4 py-3 flex flex-col sm:flex-row sm:items-center gap-3">
    <div class="flex items-center gap-3">
      <p class="text-sm text-neutral-300">
        <span class="font-semibold text-white" x-text="selectedCount"></span>
        playlist<span x-show="selectedCount !== 1">s</span> selected
      </p>
      <button @click="clearSelection()" class="text-xs text-neutral-500 hover:text-neutral-300">Clear</button>
    </div>
    <div class="sm:ml-auto flex items-center gap-2">
      <button
        @click="scheduleSelected()"
        :data-tooltip="selectedCount === 1 ? 'Schedule this playlist' : `Schedule ${selectedCount} playlists`"
        class="tooltip flex-1 sm:flex-none inline-flex items-center justify-center gap-1.5 rounded-xl border border-neutral-700 text-neutral-200 hover:bg-neutral-800 text-sm px-4 py-2.5 transition"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        <span x-text="selectedCount === 1 ? 'Schedule' : `Schedule (${selectedCount})`"></span>
      </button>
      <button
        @click="openSyncDialog()"
        :disabled="syncing"
        class="flex-1 sm:flex-none rounded-xl bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-5 py-2.5 transition disabled:opacity-50 flex items-center justify-center gap-2"
      >
        <span x-show="!syncing">Sync once →</span>
        <span x-show="syncing">Starting…</span>
      </button>
    </div>
  </div>
</div>
