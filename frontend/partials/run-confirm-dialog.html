<!-- Confirm running a schedule now (mode is already set on the schedule). -->
<div
  x-show="runConfirm.open"
  x-transition.opacity
  @keydown.escape.window="runConfirm = { open: false, mapping: null }"
  class="fixed inset-0 z-[110] flex items-center justify-center p-4"
  style="display:none"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="runConfirm = { open: false, mapping: null }"></div>

  <div
    x-show="runConfirm.open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="relative w-full max-w-sm rounded-2xl border border-neutral-800 bg-neutral-900 shadow-2xl p-6 space-y-4"
  >
    <div>
      <h2 class="text-base font-semibold">Sync now?</h2>
      <p class="text-sm text-neutral-400 mt-1 truncate" x-text="runConfirm.mapping?.spotify_name"></p>
      <p class="text-[11px] text-neutral-500 mt-1.5" x-text="runConfirm.mapping?.mode === 'mirror' ? 'Mirror — adds new tracks and removes any no longer in the source.' : 'Adds new tracks; nothing already on Tidal is removed.'"></p>
    </div>
    <div class="flex gap-2 justify-end">
      <button @click="runConfirm = { open: false, mapping: null }" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
      <button @click="confirmRunNow()" class="rounded-lg bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-4 py-2 transition">Sync now</button>
    </div>
  </div>
</div>
