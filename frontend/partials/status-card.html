<!-- Phase 0 placeholder: proves the SPA reaches the backend through nginx. Replaced by the
     auth-gate + dashboard in later phases. -->
<section class="rounded-xl border border-neutral-800 bg-neutral-900/50 p-6 space-y-5">
  <div class="flex items-center gap-2">
    <span
      class="w-2.5 h-2.5 rounded-full"
      :class="health === 'ok' ? 'bg-accent-500' : (health === 'loading' ? 'bg-neutral-500 animate-pulse' : 'bg-red-500')"
    ></span>
    <h2 class="font-medium">
      Backend:
      <span x-text="health === 'ok' ? 'connected' : (health === 'loading' ? 'checking…' : 'unreachable')"></span>
    </h2>
  </div>

  <div class="grid sm:grid-cols-2 gap-3">
    <template x-for="svc in ['spotify', 'tidal']" :key="svc">
      <div class="rounded-lg border border-neutral-800 px-4 py-3 flex items-center justify-between">
        <span class="capitalize text-sm" x-text="svc"></span>
        <span
          class="text-xs px-2 py-0.5 rounded-full"
          :class="session[svc]?.connected ? 'bg-accent-500/15 text-accent-300'
                  : (session[svc]?.configured ? 'bg-neutral-800 text-neutral-300' : 'bg-neutral-800 text-neutral-500')"
          x-text="session[svc]?.connected ? 'connected'
                  : (session[svc]?.configured ? 'not connected' : 'not configured')"
        ></span>
      </div>
    </template>
  </div>

  <p class="text-xs text-neutral-500">
    Scaffold is live. Auth, playlist sync, history, and scheduled auto-sync arrive in the
    next phases.
  </p>
</section>
