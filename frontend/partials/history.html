<!-- Recent runs for the active tab; expand any row for a full breakdown. -->
<div x-data="{ open: null }">
  <div x-show="visibleRuns.length === 0" class="rounded-xl border border-dashed border-neutral-800 p-8 text-center">
    <p class="text-sm text-neutral-400" x-text="historyTab === 'scheduled' ? 'No scheduled syncs have run yet.' : 'No manual syncs yet.'"></p>
  </div>

  <div x-show="visibleRuns.length > 0" class="rounded-xl border border-neutral-800 overflow-hidden divide-y divide-neutral-800">
    <template x-for="run in visibleRuns" :key="run.id">
      <div class="bg-neutral-900/40">
        <button
          @click="open === run.id ? open = null : open = run.id"
          class="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-neutral-900/80 transition"
        >
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-1.5">
              <p class="text-sm font-medium truncate min-w-0" x-text="run.playlist_name"></p>
              <span x-show="run.mode === 'mirror'" data-tooltip="Mirror — added new and removed deleted" class="tooltip text-[10px] px-1.5 py-0.5 rounded-full bg-neutral-800 text-neutral-400 shrink-0">mirror</span>
            </div>
            <p class="text-xs text-neutral-500 mt-0.5">
              <span x-text="run.added"></span> added ·
              <span x-text="run.total - run.not_found"></span> matched ·
              <span x-text="run.not_found"></span> missed
              <span class="text-neutral-700">·</span>
              <span :data-tooltip="formatWhen(run.finished_at || run.created_at)" class="tooltip" x-text="formatRelative(run.finished_at || run.created_at)"></span>
            </p>
          </div>
          <span class="text-[11px] px-2 py-0.5 rounded-full capitalize shrink-0" :class="statusClass(run.status)" x-text="run.status"></span>
          <span class="text-neutral-600 text-xs transition-transform shrink-0" :class="open === run.id ? 'rotate-90' : ''">›</span>
        </button>

        <div x-show="open === run.id" x-transition class="px-4 pb-4 pt-1 space-y-3">
          <!-- Outcome headline -->
          <p class="text-xs" :class="run.status === 'error' ? 'text-red-300' : run.status === 'partial' ? 'text-amber-300' : 'text-neutral-300'" x-text="runHeadline(run)"></p>

          <!-- Stat chips -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            <div class="rounded-lg bg-neutral-900/60 border border-neutral-800 px-3 py-2">
              <p class="text-[10px] uppercase tracking-wide text-neutral-600">Tracks</p>
              <p class="text-sm font-medium text-neutral-200" x-text="run.total"></p>
            </div>
            <div class="rounded-lg bg-neutral-900/60 border border-neutral-800 px-3 py-2">
              <p class="text-[10px] uppercase tracking-wide text-neutral-600">Added</p>
              <p class="text-sm font-medium text-accent-300" x-text="run.added"></p>
            </div>
            <div class="rounded-lg bg-neutral-900/60 border border-neutral-800 px-3 py-2 tooltip" data-tooltip="Matched by ISRC code vs. by title/artist search">
              <p class="text-[10px] uppercase tracking-wide text-neutral-600">Matched</p>
              <p class="text-sm font-medium text-neutral-200">
                <span x-text="run.matched_isrc"></span><span class="text-neutral-600 text-xs"> isrc</span>
                <span class="text-neutral-700"> · </span>
                <span x-text="run.matched_meta"></span><span class="text-neutral-600 text-xs"> meta</span>
              </p>
            </div>
            <div class="rounded-lg bg-neutral-900/60 border border-neutral-800 px-3 py-2">
              <p class="text-[10px] uppercase tracking-wide text-neutral-600">Missed</p>
              <p class="text-sm font-medium" :class="run.not_found ? 'text-amber-300' : 'text-neutral-200'" x-text="run.not_found"></p>
            </div>
          </div>

          <!-- Timing / meta -->
          <div class="flex flex-wrap gap-x-5 gap-y-1 text-xs text-neutral-500">
            <span>Started <span class="text-neutral-300" x-text="formatWhen(run.started_at || run.created_at)"></span></span>
            <span>Finished <span class="text-neutral-300" x-text="formatWhen(run.finished_at)"></span></span>
            <span>Took <span class="text-neutral-300" x-text="runDuration(run)"></span></span>
            <span>Trigger <span class="text-neutral-300" x-text="run.scheduled ? 'scheduled' : 'manual'"></span></span>
            <template x-if="run.tidal_playlist_id">
              <a :href="tidalPlaylistUrl(run.tidal_playlist_id)" target="_blank" rel="noopener" class="text-accent-300 hover:text-accent-200 underline-offset-2 hover:underline inline-flex items-center gap-1">
                Open on Tidal
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
              </a>
            </template>
          </div>

          <!-- Error -->
          <template x-if="run.error">
            <p class="text-xs text-red-300 bg-red-500/10 rounded-lg p-2 break-words" x-text="run.error"></p>
          </template>

          <!-- Unmatched tracks -->
          <template x-if="run.unmatched.length">
            <div class="space-y-1">
              <p class="text-[11px] uppercase tracking-wide text-neutral-600">Not found on Tidal (<span x-text="run.unmatched.length"></span>)</p>
              <div class="space-y-1 max-h-48 overflow-auto rounded-lg bg-neutral-900/60 border border-neutral-800 p-2">
                <template x-for="(t, i) in run.unmatched" :key="i">
                  <p class="text-xs text-neutral-400 truncate">
                    <span x-text="t.name"></span>
                    <span class="text-neutral-600"> — <span x-text="t.artists.join(', ')"></span></span>
                  </p>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
