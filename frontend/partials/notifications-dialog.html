<!-- Discord notification settings (opened from the Settings panel; sits above it at z-[120]). -->
<div
  x-show="showNotifications"
  x-transition.opacity
  @keydown.escape.window="showNotifications = false"
  class="fixed inset-0 z-[120] flex items-center justify-center p-4"
  style="display:none"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="showNotifications = false"></div>

  <div
    x-show="showNotifications"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="relative w-full max-w-md rounded-2xl border border-neutral-800 bg-neutral-900 shadow-2xl p-6 space-y-5"
  >
    <div class="flex items-start justify-between">
      <div>
        <h2 class="text-base font-semibold">Discord notifications</h2>
        <p class="text-sm text-neutral-400 mt-1">Get pinged when a sync fails or a connection drops.</p>
      </div>
      <button @click="showNotifications = false" aria-label="Close" class="grid place-items-center w-8 h-8 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 -mt-1 -mr-1">✕</button>
    </div>

    <div x-show="notifLoading" class="text-sm text-neutral-500 py-4 text-center">Loading…</div>

    <div x-show="!notifLoading" class="space-y-5">
      <!-- Master switch -->
      <div class="flex items-center justify-between gap-3">
        <div class="select-none min-w-0">
          <p class="text-sm text-neutral-200">Enable notifications</p>
          <p class="text-[11px] text-neutral-500">Master switch for this account.</p>
        </div>
        <button
          type="button"
          @click="notif.enabled = !notif.enabled"
          class="relative w-9 h-5 rounded-full transition shrink-0"
          :class="notif.enabled ? 'bg-accent-500' : 'bg-neutral-700'"
        >
          <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform" :class="notif.enabled ? 'translate-x-4' : ''"></span>
        </button>
      </div>

      <!-- Webhook URL + test -->
      <div>
        <label class="block text-xs font-medium text-neutral-400 uppercase tracking-wide mb-2">Webhook URL</label>
        <input
          type="url"
          x-model="notif.webhook_url"
          placeholder="https://discord.com/api/webhooks/…"
          class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60"
        />
        <div class="flex items-center justify-between mt-2">
          <p class="text-[11px] text-neutral-500">Discord → Channel settings → Integrations → Webhooks.</p>
          <button
            @click="testNotification()"
            :disabled="notifTesting"
            class="text-xs rounded-lg border border-neutral-700 text-neutral-300 hover:border-accent-500/40 hover:text-accent-200 px-3 py-1.5 transition disabled:opacity-50 shrink-0"
          >
            <span x-show="!notifTesting">Send test</span>
            <span x-show="notifTesting">Sending…</span>
          </button>
        </div>
      </div>

      <!-- Event toggles -->
      <div class="space-y-3 pt-1" :class="notif.enabled ? '' : 'opacity-50 pointer-events-none'">
        <p class="text-xs font-medium text-neutral-400 uppercase tracking-wide">Notify me about</p>
        <template
          x-for="ev in [
            { key: 'on_failure', label: 'Sync failures', hint: 'A scheduled or manual sync ends in an error.' },
            { key: 'on_revocation', label: 'Lost connections', hint: 'Spotify or Tidal needs to be reconnected.' },
            { key: 'on_success', label: 'Successful syncs', hint: 'Every completed run — can get noisy.' },
          ]"
          :key="ev.key"
        >
          <div class="flex items-center justify-between gap-3">
            <div class="select-none min-w-0">
              <p class="text-sm text-neutral-200" x-text="ev.label"></p>
              <p class="text-[11px] text-neutral-500" x-text="ev.hint"></p>
            </div>
            <button
              type="button"
              @click="notif[ev.key] = !notif[ev.key]"
              class="relative w-9 h-5 rounded-full transition shrink-0"
              :class="notif[ev.key] ? 'bg-accent-500' : 'bg-neutral-700'"
            >
              <span class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform" :class="notif[ev.key] ? 'translate-x-4' : ''"></span>
            </button>
          </div>
        </template>
      </div>

      <div class="flex gap-2 justify-end pt-2">
        <button @click="showNotifications = false" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
        <button @click="saveNotifications()" :disabled="notifSaving" class="rounded-lg bg-accent-500 hover:bg-accent-400 disabled:opacity-50 text-neutral-950 font-medium text-sm px-4 py-2 transition">
          <span x-show="!notifSaving">Save</span>
          <span x-show="notifSaving">Saving…</span>
        </button>
      </div>
    </div>
  </div>
</div>
