<!-- Delete-user confirmation -->
<div
  x-show="deleteUserModal.open"
  x-transition.opacity
  @keydown.escape.window="deleteUserModal = { open: false, user: null }"
  class="fixed inset-0 z-[120] flex items-center justify-center p-4"
  style="display:none"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="deleteUserModal = { open: false, user: null }"></div>

  <div
    x-show="deleteUserModal.open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="relative w-full max-w-sm rounded-2xl border border-neutral-800 bg-neutral-900 shadow-2xl p-6 space-y-4"
  >
    <div>
      <h2 class="text-base font-semibold">Delete user?</h2>
      <p class="text-sm text-neutral-400 mt-1">
        <span class="text-neutral-200" x-text="deleteUserModal.user?.username"></span> will be removed,
        along with their connected accounts, schedules, and sync history. This can't be undone.
      </p>
    </div>
    <div class="flex gap-2 justify-end">
      <button @click="deleteUserModal = { open: false, user: null }" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
      <button @click="confirmDeleteUser()" class="rounded-lg bg-red-500 hover:bg-red-400 text-neutral-950 font-medium text-sm px-4 py-2 transition">Delete</button>
    </div>
  </div>
</div>

<!-- Reset-password -->
<div
  x-show="resetPwModal.open"
  x-transition.opacity
  @keydown.escape.window="resetPwModal = { open: false, user: null, value: '', confirm: '', saving: false }"
  class="fixed inset-0 z-[120] flex items-center justify-center p-4"
  style="display:none"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="resetPwModal = { open: false, user: null, value: '', confirm: '', saving: false }"></div>

  <div
    x-show="resetPwModal.open"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="relative w-full max-w-sm rounded-2xl border border-neutral-800 bg-neutral-900 shadow-2xl p-6 space-y-4"
  >
    <div>
      <h2 class="text-base font-semibold">Reset password</h2>
      <p class="text-sm text-neutral-400 mt-1">Set a new password for <span class="text-neutral-200" x-text="resetPwModal.user?.username"></span>.</p>
    </div>
    <form @submit.prevent="confirmResetPassword()" class="space-y-2">
      <input type="password" x-model="resetPwModal.value" autocomplete="new-password" placeholder="New password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
      <input type="password" x-model="resetPwModal.confirm" autocomplete="new-password" placeholder="Confirm new password" class="w-full bg-neutral-950/70 border border-neutral-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent-500/60" />
      <div class="flex gap-2 justify-end pt-1">
        <button type="button" @click="resetPwModal = { open: false, user: null, value: '', confirm: '', saving: false }" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
        <button type="submit" :disabled="resetPwModal.saving" class="rounded-lg bg-accent-500 hover:bg-accent-400 disabled:opacity-50 text-neutral-950 font-medium text-sm px-4 py-2 transition">
          <span x-show="!resetPwModal.saving">Reset</span>
          <span x-show="resetPwModal.saving">Saving…</span>
        </button>
      </div>
    </form>
  </div>
</div>
