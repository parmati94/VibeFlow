<header class="sticky top-0 z-20 border-b border-neutral-800/80 bg-neutral-950/80 backdrop-blur">
  <div class="container mx-auto max-w-5xl px-4 py-3.5 flex items-center gap-3">
    <button @click="setView('home')" class="flex items-center gap-3 mr-2 group">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent-400 to-accent-600 grid place-items-center text-neutral-950 font-black shadow-lg shadow-accent-500/20">
        VF
      </div>
      <div class="text-left hidden sm:block">
        <h1 class="text-base font-semibold leading-tight tracking-tight group-hover:text-accent-300 transition">VibeFlow</h1>
        <p class="text-[11px] text-neutral-500 leading-tight">Keep your playlists in sync</p>
      </div>
      <span
        x-show="session.dev"
        class="text-[10px] font-semibold uppercase tracking-wide px-1.5 py-0.5 rounded bg-amber-500/15 text-amber-300 border border-amber-500/30"
        title="DEV_AUTH on — Spotify uses the refresh-token bypass"
      >dev</span>
    </button>

    <!-- Hamburger (mobile only, when nav is usable) -->
    <button
      x-show="!booting && bothConnected"
      @click="mobileNav = !mobileNav"
      :aria-expanded="mobileNav"
      aria-label="Menu"
      class="md:hidden grid place-items-center w-9 h-9 rounded-lg text-neutral-300 hover:bg-neutral-800 transition shrink-0"
    >
      <svg x-show="!mobileNav" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
      <svg x-show="mobileNav" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>

    <!-- Primary nav — inline on desktop, only when usable -->
    <nav x-show="!booting && bothConnected" class="hidden md:flex items-center gap-1 mr-auto">
      <template x-for="item in navItems" :key="item.id">
        <button
          @click="setView(item.id)"
          class="px-3 py-1.5 rounded-lg text-sm transition"
          :class="view === item.id ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:text-neutral-200'"
          x-text="item.label"
        ></button>
      </template>
    </nav>
    <!-- Spacer keeps the right-side controls pinned right (mobile always; desktop pre-connect) -->
    <div class="mr-auto" :class="!booting && bothConnected ? 'md:hidden' : ''"></div>

    <!-- Connection status indicators (manage in Settings) -->
    <div class="flex items-center gap-2" x-show="!booting">
      <template x-for="svc in ['spotify', 'tidal']" :key="svc">
        <div
          class="tooltip flex items-center gap-1.5 rounded-full border border-neutral-800 bg-neutral-900/60 px-2.5 py-1 text-xs"
          :data-tooltip="(svc === 'spotify' ? 'Spotify' : 'Tidal') + (session[svc].connected ? ' connected' : ' not connected — manage in Settings')"
        >
          <span
            class="w-1.5 h-1.5 rounded-full"
            :class="session[svc].connected ? (svc === 'spotify' ? 'bg-emerald-400' : 'bg-accent-400') : 'bg-neutral-600'"
          ></span>
          <span class="capitalize text-neutral-300 hidden sm:inline" x-text="svc"></span>
        </div>
      </template>
      <button
        @click="showSettings = true"
        data-tooltip="Settings"
        class="tooltip grid place-items-center w-8 h-8 rounded-lg text-neutral-400 hover:text-neutral-200 hover:bg-neutral-800 transition"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
      <button
        x-show="loginEnabled"
        @click="signOut()"
        data-tooltip="Sign out"
        class="tooltip group grid place-items-center w-8 h-8 rounded-lg text-neutral-400 hover:bg-neutral-800 transition"
      >
        <svg class="w-5 h-5 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile nav dropdown -->
  <nav
    x-show="mobileNav && !booting && bothConnected"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="md:hidden border-t border-neutral-800/80 bg-neutral-950/95 backdrop-blur"
  >
    <div class="container mx-auto max-w-5xl px-4 py-2 flex flex-col">
      <template x-for="item in navItems" :key="item.id">
        <button
          @click="setView(item.id)"
          class="w-full text-left px-3 py-2.5 rounded-lg text-sm transition"
          :class="view === item.id ? 'bg-neutral-800 text-white' : 'text-neutral-300 hover:bg-neutral-800/60'"
          x-text="item.label"
        ></button>
      </template>
    </div>
  </nav>
</header>
