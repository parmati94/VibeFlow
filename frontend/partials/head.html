<!doctype html>
<html lang="en" data-theme="vibe">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="stylesheet" href="/css/main.css" />
    <script type="module" src="/js/app.js"></script>
  </head>
  <body x-data="app" x-cloak class="min-h-full flex flex-col">
    <!-- Subtle accent bloom behind everything (re-tints with the active theme). -->
    <div
      class="pointer-events-none fixed inset-0 -z-10"
      style="background: radial-gradient(55rem 40rem at 50% -12%, rgb(var(--accent-500) / 0.08), transparent 60%);"
    ></div>
