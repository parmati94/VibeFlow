<!-- "Sync once" dialog: pick the reconcile mode before a one-time sync. -->
<div
  x-show="showSyncDialog"
  x-transition.opacity
  @keydown.escape.window="showSyncDialog = false"
  class="fixed inset-0 z-[110] flex items-center justify-center p-4"
  style="display:none"
>
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="showSyncDialog = false"></div>

  <div
    x-show="showSyncDialog"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="relative w-full max-w-md rounded-2xl border border-neutral-800 bg-neutral-900 shadow-2xl p-6 space-y-4"
  >
    <div>
      <h2 class="text-base font-semibold">Sync to Tidal</h2>
      <p class="text-xs text-neutral-500 mt-0.5">
        <span x-text="selectedCount"></span> playlist<span x-show="selectedCount !== 1">s</span> · this is a one-time sync.
      </p>
    </div>

    <div>
      <label class="text-xs text-neutral-500 mb-1 block">Mode</label>
      <div x-data="vfselect(modeOpts)" x-modelable="value" x-model="syncMode" @click.away="open = false" class="relative">
        <button type="button" @click="open = !open" class="w-full flex items-center justify-between gap-2 rounded-lg border border-neutral-800 bg-neutral-950 px-3 py-2 text-sm hover:border-neutral-700 focus:border-accent-500/60 focus:outline-none transition">
          <span x-text="selectedLabel"></span>
          <svg class="w-4 h-4 text-neutral-500 transition-transform shrink-0" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div x-show="open" x-transition.opacity.duration.100ms class="absolute z-30 mt-1 w-full rounded-lg border border-neutral-800 bg-neutral-950 shadow-xl py-1">
          <template x-for="o in options" :key="o.value">
            <button type="button" @click="pick(o.value)" class="w-full flex items-center justify-between gap-2 text-left px-3 py-1.5 text-sm transition hover:bg-neutral-800" :class="isSelected(o.value) ? 'text-accent-300' : 'text-neutral-200'">
              <span x-text="o.label"></span>
              <svg x-show="isSelected(o.value)" class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </button>
          </template>
        </div>
      </div>
      <p class="text-[11px] text-neutral-500 mt-1.5" x-text="syncMode === 'mirror' ? 'Tidal will match the Spotify playlist exactly — adds new tracks and removes any not in the source.' : 'New tracks are added to the Tidal playlist; nothing already there is removed.'"></p>
    </div>

    <div class="flex gap-2 justify-end pt-1">
      <button @click="showSyncDialog = false" class="rounded-lg border border-neutral-700 text-neutral-300 hover:bg-neutral-800 text-sm px-4 py-2 transition">Cancel</button>
      <button @click="confirmSync()" class="rounded-lg bg-accent-500 hover:bg-accent-400 text-neutral-950 font-medium text-sm px-4 py-2 transition">Sync now</button>
    </div>
  </div>
</div>
