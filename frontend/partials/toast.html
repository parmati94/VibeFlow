<!-- Global action-result banner. Outer wrapper centers via flex (no transform), so the
     animated element only transitions opacity — avoids a sideways snap on enter. -->
<div class="fixed top-20 inset-x-0 z-[200] flex justify-center px-4 pointer-events-none">
  <div
    x-show="toastVisible"
    x-transition.opacity.duration.300ms
    class="pointer-events-auto w-full max-w-sm cursor-pointer"
    @click="dismissToast()"
  >
    <div
      class="flex items-start gap-3 rounded-xl border px-4 py-3 shadow-xl backdrop-blur"
      :class="toastState?.ok ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-200' : 'border-red-500/30 bg-red-500/10 text-red-200'"
    >
      <span class="text-sm" x-text="toastState?.ok ? '✓' : '✕'"></span>
      <p class="text-sm" x-text="toastState?.message"></p>
    </div>
  </div>
</div>
