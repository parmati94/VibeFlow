{{> head }}
{{> header }}

<main class="flex-1 container mx-auto max-w-5xl px-4 py-8 pb-28">
  <!-- Boot probe -->
  <div x-show="booting" class="grid place-items-center py-24">
    <div class="w-7 h-7 rounded-full border-2 border-neutral-700 border-t-accent-400 animate-spin"></div>
  </div>

  <!-- Backend unreachable -->
  <div x-show="!booting && health === 'error'" class="rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-300">
    Can't reach the VibeFlow backend. Check that the service is running.
  </div>

  <!-- Not connected: auth gate -->
  <div x-show="!booting && health === 'ok' && !bothConnected">
    {{> auth-gate }}
  </div>

  <!-- Connected: navigated views -->
  <template x-if="!booting && health === 'ok' && bothConnected">
    <div>
      <div x-show="view === 'home'">{{> view-home }}</div>
      <div x-show="view === 'sync'" class="space-y-8">
        {{> sync-status }}
        {{> playlist-browser }}
      </div>
      <div x-show="view === 'scheduled'">{{> view-scheduled }}</div>
      <div x-show="view === 'history'" class="space-y-4">
        <h2 class="text-lg font-semibold">Sync history</h2>
        <div class="inline-flex rounded-lg border border-neutral-800 bg-neutral-900/50 p-0.5 text-sm">
          <button @click="historyTab = 'manual'" class="px-3 py-1.5 rounded-md transition" :class="historyTab === 'manual' ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:text-neutral-200'">
            Manual <span class="text-neutral-500" x-text="`(${manualRuns.length})`"></span>
          </button>
          <button @click="historyTab = 'scheduled'" class="px-3 py-1.5 rounded-md transition" :class="historyTab === 'scheduled' ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:text-neutral-200'">
            Scheduled <span class="text-neutral-500" x-text="`(${scheduledRuns.length})`"></span>
          </button>
        </div>
        {{> history }}
      </div>
    </div>
  </template>
</main>

{{> toast }}
