user root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # uvicorn (FastAPI) — same host, internal port.
    upstream api {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        # Hashed Vite build assets — fingerprinted, so cache hard & immutable.
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Frontend SPA. index.html stays uncached so new asset hashes are picked up.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # JSON API — proxied to uvicorn. Playlist syncs (many Tidal searches/adds) can run
        # well past the default 60s, so the read timeout is generous.
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Spotify + Tidal OAuth round-trips — proxied as-is so the whole flow, including
        # the provider redirects, stays on this single public origin.
        location /auth/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Container health check (nginx liveness, no backend dependency).
        location = /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
