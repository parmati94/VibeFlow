name: vibeflow-local
# Personal deploy on this box (gitignored origin). Built locally; served behind a reverse
# proxy at a real HTTPS domain. Run with:
#   docker compose -f docker-compose.local.yml up -d --build
services:
  vibeflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: vibeflow:local
    container_name: vibeflow-local
    ports:
      - "5572:80"
    env_file:
      - ./.env
    environment:
      - TZ=America/New_York
      # Real public origin (HTTPS). Register these in the Spotify + Tidal app dashboards.
      - SPOTIFY_REDIRECT_URI=https://vibeflow.parmati.me/auth/spotify/callback
      - TIDAL_REDIRECT_URI=https://vibeflow.parmati.me/auth/tidal/callback
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app/backend                          # backend live-reload via uvicorn --reload
      - ./frontend/dist:/usr/share/nginx/html           # host-built frontend
      - ./supervisor/supervisord.dev.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      - vibeflow-dev-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  vibeflow-dev-data:
